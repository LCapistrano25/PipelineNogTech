<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NogTech · Dashboard de BI</title>

  <!-- Bibliotecas via CDN (UMD): React, Recharts e Babel para JSX em runtime.
       Versões FIXAS de propósito: o Babel 8 deixou de aplicar o preset React
       automaticamente em <script type="text/babel"> e passou a usar o runtime
       "automatic" (gera import de "react/jsx-runtime", que quebra sem bundler).
       Mantemos o Babel 7.x (runtime "classic" -> React.createElement) e fixamos
       todas as dependências para que uma release upstream não derrube o dashboard. -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script crossorigin src="https://unpkg.com/recharts@2.15.4/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>

  <!-- Dados agregados gerados por generate_dashboard_data.py (define window.__DASHBOARD_DATA__) -->
  <script src="data.js"></script>

  <style>
    :root {
      --bg: #0d0f17;
      --bg-grad: radial-gradient(1200px 600px at 80% -10%, #1c2440 0%, transparent 60%), var(--bg);
      --card: #161a27;
      --card-2: #1d2233;
      --border: #262c40;
      --text: #e7ecf5;
      --muted: #8b93a7;
      --accent: #6366f1;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg-grad);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap { max-width: 1320px; margin: 0 auto; padding: 28px 22px 60px; }

    header.app { margin-bottom: 22px; }
    .brand { display: flex; align-items: center; gap: 14px; }
    .logo {
      width: 46px; height: 46px; border-radius: 12px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: grid; place-items: center; font-weight: 800; font-size: 20px; color: #fff;
      box-shadow: 0 8px 24px rgba(99,102,241,.35);
    }
    h1 { font-size: 22px; margin: 0; letter-spacing: .2px; }
    .sub { color: var(--muted); font-size: 13px; margin-top: 3px; max-width: 760px; }

    /* Cabeçalho de seção temática (uma das 4 perguntas da diretoria) */
    .section-head { display: flex; align-items: baseline; gap: 12px; margin: 30px 0 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .section-head .q { font-size: 12px; font-weight: 700; color: #fff; background: linear-gradient(135deg,#6366f1,#8b5cf6); padding: 3px 9px; border-radius: 7px; white-space: nowrap; }
    .section-head h2 { font-size: 18px; margin: 0; }
    .section-head .desc { color: var(--muted); font-size: 13px; }

    .grid { display: grid; gap: 16px; }
    .kpis { grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); margin-bottom: 6px; }
    .charts { grid-template-columns: repeat(12, 1fr); }
    .col-12 { grid-column: span 12; }
    .col-8 { grid-column: span 8; }
    .col-7 { grid-column: span 7; }
    .col-6 { grid-column: span 6; }
    .col-5 { grid-column: span 5; }
    .col-4 { grid-column: span 4; }
    @media (max-width: 980px) {
      .col-8, .col-7, .col-6, .col-5, .col-4 { grid-column: span 12; }
    }

    .card {
      background: linear-gradient(180deg, var(--card) 0%, var(--card-2) 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 18px 14px;
      box-shadow: 0 6px 22px rgba(0,0,0,.25);
    }
    .kpi .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .6px; }
    .kpi .value { font-size: 26px; font-weight: 750; margin-top: 8px; line-height: 1.1; }
    .kpi .hint { color: var(--muted); font-size: 12px; margin-top: 6px; }
    .kpi .dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:7px; vertical-align: middle; }
    .kpi.alert { border-color: #5b2330; background: linear-gradient(180deg, #241620 0%, #1d1622 100%); }
    .kpi.alert .value { color: #fb7185; }

    .card h3 { margin: 0 0 14px; font-size: 15px; font-weight: 650; }
    .card .chart { width: 100%; height: 300px; }
    .card .chart.tall { height: 360px; }
    .insight { color: var(--muted); font-size: 12.5px; margin: 10px 2px 2px; line-height: 1.5; }
    .insight b { color: var(--text); }

    table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
    th, td { text-align: left; padding: 9px 8px; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .4px; }
    td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
    .rank { color: var(--muted); width: 26px; }
    .mut { color: var(--muted); }

    .empty { text-align:center; padding: 60px 20px; color: var(--muted); }
    .empty code { background:#0008; padding:3px 8px; border-radius:6px; color:#cdd5e6; }
    footer { color: var(--muted); font-size: 12px; margin-top: 30px; text-align: center; }
    .pill { display:inline-block; padding:3px 10px; border:1px solid var(--border); border-radius:999px; font-size:12px; color:var(--muted); }
    /* Tooltip do Recharts: garante texto legivel no tema escuro */
    .recharts-default-tooltip { color: #e7ecf5 !important; }
    .recharts-tooltip-label { color: #e7ecf5 !important; font-weight: 700; margin-bottom: 4px !important; }
    .recharts-tooltip-item,
    .recharts-tooltip-item-name,
    .recharts-tooltip-item-value,
    .recharts-tooltip-item-separator { color: #cdd5e6 !important; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useMemo } = React;
    const {
      ResponsiveContainer, ComposedChart, BarChart, Bar, LineChart, Line, PieChart, Pie,
      Cell, XAxis, YAxis, CartesianGrid, Tooltip, Legend
    } = Recharts;

    const PALETTE = ["#6366f1", "#8b5cf6", "#06b6d4", "#10b981", "#f59e0b", "#ef4444", "#ec4899", "#14b8a6", "#a78bfa", "#f97316"];
    const AXIS = "#8b93a7";
    const GRID = "#262c40";

    const fmtBRL = (v) => new Intl.NumberFormat("pt-BR", { style: "currency", currency: "BRL", maximumFractionDigits: 0 }).format(v || 0);
    const fmtBRLk = (v) => "R$ " + new Intl.NumberFormat("pt-BR", { notation: "compact", maximumFractionDigits: 1 }).format(v || 0);
    const fmtInt = (v) => new Intl.NumberFormat("pt-BR").format(v || 0);
    const orDash = (v) => (v === null || v === undefined ? "—" : v);

    const tooltipStyle = { background: "#11141f", border: "1px solid #2a3150", borderRadius: 10, fontSize: 13, color: "#e7ecf5" };

    function KpiCard({ label, value, hint, color, alert }) {
      return (
        <div className={"card kpi" + (alert ? " alert" : "")}>
          <div className="label">{label}</div>
          <div className="value">{value}</div>
          {hint && <div className="hint"><span className="dot" style={{ background: color || "var(--accent)" }} />{hint}</div>}
        </div>
      );
    }

    function ChartCard({ title, className, children }) {
      return (
        <div className={"card " + (className || "")}>
          <h3>{title}</h3>
          {children}
        </div>
      );
    }

    function SectionHead({ q, title, desc }) {
      return (
        <div className="section-head">
          <span className="q">{q}</span>
          <h2>{title}</h2>
          <span className="desc">{desc}</span>
        </div>
      );
    }

    function Dashboard({ data }) {
      const {
        kpis, receitaPorMes, receitaPorPlano, recorrencia, topAlunos, porEstado, topCidades,
        npsDistrib, feriado, engajamentoPorMes, engajamentoPorPlano, consumo, enriquecimento
      } = data;

      const qualidade = useMemo(() => ([
        { name: "CEP enriquecido", value: enriquecimento.cepResolvido, color: "#10b981" },
        { name: "CEP sem retorno", value: enriquecimento.cepNaoResolvido, color: "#ef4444" },
      ]), [enriquecimento]);

      const ticketFeriado = useMemo(() => feriado.map(f => ({
        label: f.label, ticketMedio: f.transacoes ? f.receita / f.transacoes : 0, receita: f.receita, transacoes: f.transacoes,
      })), [feriado]);

      const geradoEm = data.generatedAt ? new Date(data.generatedAt).toLocaleString("pt-BR") : "—";

      return (
        <div className="wrap">
          <header className="app">
            <div className="brand">
              <div className="logo">N</div>
              <div>
                <h1>NogTech · Relatório Executivo de Vendas & Engajamento</h1>
                <div className="sub">Visão única cruzando transações financeiras e consumo da plataforma: <b>quem paga</b>, <b>de onde vem</b>, <b>quando compra</b> (incluindo feriados) e <b>se está realmente consumindo</b> — saída final do pipeline ETL (Luigi).</div>
              </div>
            </div>
          </header>

          {/* Resumo executivo */}
          <div className="grid kpis">
            <KpiCard label="Receita total" value={fmtBRL(kpis.receitaTotal)} hint={fmtInt(kpis.totalTransacoes) + " transações"} color="#6366f1" />
            <KpiCard label="Ticket médio" value={fmtBRL(kpis.ticketMedio)} hint="por transação" color="#8b5cf6" />
            <KpiCard label="Alunos pagantes" value={fmtInt(kpis.alunosUnicos)} hint="CPFs únicos" color="#06b6d4" />
            <KpiCard label="Consumindo a plataforma" value={kpis.taxaMatchEngajamento + "%"} hint="dos pagamentos têm engajamento" color="#10b981" />
            <KpiCard label="NPS médio" value={kpis.npsMedio} hint="escala 0–10" color="#f59e0b" />
            <KpiCard label="Receita em risco" value={kpis.pctReceitaSemConsumo + "%"} hint={fmtBRL(kpis.receitaSemConsumo) + " sem consumo registrado"} alert />
          </div>

          {/* ===================== 1. QUEM PAGA ===================== */}
          <SectionHead q="Quem paga" title="Perfil de pagamento" desc="Quem está pagando pelos cursos e o que compra" />
          <div className="grid charts">
            <ChartCard title="Receita por plano" className="col-4">
              <div className="chart">
                <ResponsiveContainer>
                  <PieChart>
                    <Pie data={receitaPorPlano} dataKey="receita" nameKey="plano" cx="50%" cy="48%" outerRadius={92} innerRadius={52} paddingAngle={2}>
                      {receitaPorPlano.map((e, i) => <Cell key={i} fill={PALETTE[i % PALETTE.length]} />)}
                    </Pie>
                    <Tooltip className="tooltip-title" contentStyle={tooltipStyle} formatter={(v, n, p) => [fmtBRL(v), p.payload.plano]} />
                    <Legend />
                  </PieChart>
                </ResponsiveContainer>
              </div>
            </ChartCard>

            <ChartCard title="Ticket médio e volume por plano" className="col-4">
              <div className="chart">
                <ResponsiveContainer>
                  <BarChart data={receitaPorPlano} margin={{ top: 4, right: 12, left: 6, bottom: 0 }}>
                    <CartesianGrid stroke={GRID} strokeDasharray="3 3" vertical={false} />
                    <XAxis dataKey="plano" stroke={AXIS} tick={{ fontSize: 12 }} />
                    <YAxis stroke={AXIS} tick={{ fontSize: 12 }} tickFormatter={fmtBRLk} />
                    <Tooltip className="tooltip-title" contentStyle={tooltipStyle} formatter={(v, n, p) => [fmtBRL(v) + "  ·  " + fmtInt(p.payload.transacoes) + " transações", "Ticket médio"]} cursor={{ fill: "#ffffff08" }} />
                    <Bar dataKey="ticketMedio" name="Ticket médio" radius={[5, 5, 0, 0]} maxBarSize={70}>
                      {receitaPorPlano.map((e, i) => <Cell key={i} fill={PALETTE[i % PALETTE.length]} />)}
                    </Bar>
                  </BarChart>
                </ResponsiveContainer>
              </div>
            </ChartCard>

            <ChartCard title="Recorrência de compra" className="col-4">
              <div className="chart">
                <ResponsiveContainer>
                  <BarChart data={recorrencia} margin={{ top: 4, right: 12, left: 6, bottom: 0 }}>
                    <CartesianGrid stroke={GRID} strokeDasharray="3 3" vertical={false} />
                    <XAxis dataKey="faixa" stroke={AXIS} tick={{ fontSize: 12 }} />
                    <YAxis stroke={AXIS} tick={{ fontSize: 12 }} />
                    <Tooltip className="tooltip-title" contentStyle={tooltipStyle} formatter={(v) => [fmtInt(v), "Alunos"]} cursor={{ fill: "#ffffff08" }} />
                    <Bar dataKey="alunos" name="Alunos" radius={[5, 5, 0, 0]} maxBarSize={70}>
                      {recorrencia.map((e, i) => <Cell key={i} fill={["#6366f1", "#8b5cf6", "#06b6d4"][i]} />)}
                    </Bar>
                  </BarChart>
                </ResponsiveContainer>
              </div>
            </ChartCard>

            <ChartCard title="Maiores pagantes (CPF anonimizado · LGPD)" className="col-12">
              <table>
                <thead>
                  <tr><th className="rank">#</th><th>CPF (anonimizado)</th><th className="num">Compras</th><th className="num">Receita</th><th className="num">Horas assistidas (méd.)</th><th className="num">NPS (méd.)</th></tr>
                </thead>
                <tbody>
                  {topAlunos.map((a, i) => (
                    <tr key={i}>
                      <td className="rank">{i + 1}</td>
                      <td style={{ fontVariantNumeric: "tabular-nums" }}>{a.cpf}</td>
                      <td className="num">{fmtInt(a.compras)}</td>
                      <td className="num">{fmtBRL(a.receita)}</td>
                      <td className="num">{a.horasMedia === null ? <span className="mut">— sem consumo</span> : a.horasMedia + " h"}</td>
                      <td className="num">{orDash(a.npsMedio)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
              <div className="insight">As linhas marcadas como <b>“sem consumo”</b> são clientes de alto valor sem engajamento registrado — prioridade para retenção.</div>
            </ChartCard>
          </div>

          {/* ===================== 2. DE ONDE VEM ===================== */}
          <SectionHead q="De onde vem" title="Distribuição geográfica" desc="Origem geográfica dos pagamentos (enriquecida via BrasilAPI/CEP)" />
          <div className="grid charts">
            <ChartCard title="Receita por estado (UF)" className="col-6">
              <div className="chart">
                <ResponsiveContainer>
                  <BarChart data={porEstado} layout="vertical" margin={{ top: 4, right: 16, left: 6, bottom: 0 }}>
                    <CartesianGrid stroke={GRID} strokeDasharray="3 3" horizontal={false} />
                    <XAxis type="number" stroke={AXIS} tick={{ fontSize: 12 }} tickFormatter={fmtBRLk} />
                    <YAxis type="category" dataKey="estado" stroke={AXIS} tick={{ fontSize: 12 }} width={36} />
                    <Tooltip className="tooltip-title" contentStyle={tooltipStyle} formatter={(v, n, p) => [fmtBRL(v) + "  ·  ticket " + fmtBRL(p.payload.ticketMedio), "Receita"]} cursor={{ fill: "#ffffff08" }} />
                    <Bar dataKey="receita" name="Receita" radius={[0, 5, 5, 0]} maxBarSize={26}>
                      {porEstado.map((e, i) => <Cell key={i} fill={PALETTE[i % PALETTE.length]} />)}
                    </Bar>
                  </BarChart>
                </ResponsiveContainer>
              </div>
            </ChartCard>

            <ChartCard title="Top cidades por receita" className="col-6">
              <table>
                <thead>
                  <tr><th className="rank">#</th><th>Cidade</th><th>UF</th><th className="num">Transações</th><th className="num">Receita</th></tr>
                </thead>
                <tbody>
                  {topCidades.map((c, i) => (
                    <tr key={i}>
                      <td className="rank">{i + 1}</td>
                      <td>{c.cidade}</td>
                      <td>{c.estado}</td>
                      <td className="num">{fmtInt(c.transacoes)}</td>
                      <td className="num">{fmtBRL(c.receita)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </ChartCard>
          </div>

          {/* ===================== 3. QUANDO COMPRA ===================== */}
          <SectionHead q="Quando compra" title="Calendário e feriados" desc="Em quais datas as vendas acontecem, incluindo feriados nacionais" />
          <div className="grid charts">
            <ChartCard title="Receita e volume de transações por mês" className="col-8">
              <div className="chart tall">
                <ResponsiveContainer>
                  <ComposedChart data={receitaPorMes} margin={{ top: 8, right: 12, left: 6, bottom: 0 }}>
                    <CartesianGrid stroke={GRID} strokeDasharray="3 3" vertical={false} />
                    <XAxis dataKey="periodo" stroke={AXIS} tick={{ fontSize: 12 }} />
                    <YAxis yAxisId="l" stroke={AXIS} tick={{ fontSize: 12 }} tickFormatter={fmtBRLk} />
                    <YAxis yAxisId="r" orientation="right" stroke={AXIS} tick={{ fontSize: 12 }} />
                    <Tooltip contentStyle={tooltipStyle} formatter={(v, n) => n === "Receita" ? fmtBRL(v) : fmtInt(v)} />
                    <Legend />
                    <Bar yAxisId="l" dataKey="receita" name="Receita" fill="#6366f1" radius={[5, 5, 0, 0]} maxBarSize={42} />
                    <Line yAxisId="r" type="monotone" dataKey="transacoes" name="Transações" stroke="#10b981" strokeWidth={2.5} dot={{ r: 3 }} />
                  </ComposedChart>
                </ResponsiveContainer>
              </div>
            </ChartCard>

            <ChartCard title="Vendas: feriado x dia comum" className="col-4">
              <div className="chart tall">
                <ResponsiveContainer>
                  <PieChart>
                    <Pie data={feriado} dataKey="transacoes" nameKey="label" cx="50%" cy="46%" outerRadius={92} innerRadius={52} paddingAngle={2}>
                      <Cell fill="#f59e0b" />
                      <Cell fill="#6366f1" />
                    </Pie>
                    <Tooltip className="tooltip-title" contentStyle={tooltipStyle} formatter={(v, n, p) => [fmtInt(v) + " transações", p.payload.label]} />
                    <Legend />
                  </PieChart>
                </ResponsiveContainer>
                <div className="insight">Ticket médio: <b>{fmtBRL(ticketFeriado[0].ticketMedio)}</b> em feriado vs <b>{fmtBRL(ticketFeriado[1].ticketMedio)}</b> em dia comum.</div>
              </div>
            </ChartCard>
          </div>

          {/* ===================== 4. ESTÃO CONSUMINDO ===================== */}
          <SectionHead q="Estão consumindo?" title="Engajamento na plataforma" desc="Quem paga está realmente consumindo os cursos? (cruzamento pagamento × consumo)" />
          <div className="grid charts">
            <ChartCard title="Pagamentos com vs sem consumo registrado" className="col-4">
              <div className="chart">
                <ResponsiveContainer>
                  <PieChart>
                    <Pie data={consumo} dataKey="transacoes" nameKey="label" cx="50%" cy="48%" outerRadius={92} innerRadius={52} paddingAngle={2}>
                      {consumo.map((e, i) => <Cell key={i} fill={e.color} />)}
                    </Pie>
                    <Tooltip className="tooltip-title" contentStyle={tooltipStyle} formatter={(v, n, p) => [fmtInt(v) + " transações", p.payload.label]} />
                    <Legend />
                  </PieChart>
                </ResponsiveContainer>
              </div>
            </ChartCard>

            <ChartCard title="Consumo por plano (% que assiste)" className="col-8">
              <div className="chart">
                <ResponsiveContainer>
                  <ComposedChart data={engajamentoPorPlano} margin={{ top: 8, right: 12, left: 6, bottom: 0 }}>
                    <CartesianGrid stroke={GRID} strokeDasharray="3 3" vertical={false} />
                    <XAxis dataKey="plano" stroke={AXIS} tick={{ fontSize: 12 }} />
                    <YAxis yAxisId="l" stroke={AXIS} tick={{ fontSize: 12 }} domain={[0, 100]} tickFormatter={(v) => v + "%"} />
                    <YAxis yAxisId="r" orientation="right" stroke={AXIS} tick={{ fontSize: 12 }} />
                    <Tooltip className="tooltip-title" contentStyle={tooltipStyle} formatter={(v, n) => n === "% consumindo" ? v + "%" : (n === "Horas assistidas (méd.)" ? v + " h" : v)} />
                    <Legend />
                    <Bar yAxisId="l" dataKey="pctConsumindo" name="% consumindo" fill="#10b981" radius={[5, 5, 0, 0]} maxBarSize={56} />
                    <Line yAxisId="r" type="monotone" dataKey="horasMedia" name="Horas assistidas (méd.)" stroke="#06b6d4" strokeWidth={2.5} dot={{ r: 4 }} />
                  </ComposedChart>
                </ResponsiveContainer>
              </div>
            </ChartCard>

            <ChartCard title="Engajamento médio por mês" className="col-8">
              <div className="chart">
                <ResponsiveContainer>
                  <LineChart data={engajamentoPorMes} margin={{ top: 8, right: 12, left: 6, bottom: 0 }}>
                    <CartesianGrid stroke={GRID} strokeDasharray="3 3" vertical={false} />
                    <XAxis dataKey="periodo" stroke={AXIS} tick={{ fontSize: 12 }} />
                    <YAxis yAxisId="h" stroke={AXIS} tick={{ fontSize: 12 }} />
                    <YAxis yAxisId="n" orientation="right" domain={[0, 10]} stroke={AXIS} tick={{ fontSize: 12 }} />
                    <Tooltip className="tooltip-title" contentStyle={tooltipStyle} />
                    <Legend />
                    <Line yAxisId="h" type="monotone" dataKey="horasMedia" name="Horas assistidas (méd.)" stroke="#06b6d4" strokeWidth={2.5} dot={{ r: 3 }} />
                    <Line yAxisId="n" type="monotone" dataKey="npsMedio" name="NPS (méd.)" stroke="#f59e0b" strokeWidth={2.5} dot={{ r: 3 }} />
                  </LineChart>
                </ResponsiveContainer>
              </div>
            </ChartCard>

            <ChartCard title="Distribuição de NPS" className="col-4">
              <div className="chart">
                <ResponsiveContainer>
                  <BarChart data={npsDistrib} margin={{ top: 4, right: 12, left: 6, bottom: 0 }}>
                    <CartesianGrid stroke={GRID} strokeDasharray="3 3" vertical={false} />
                    <XAxis dataKey="score" stroke={AXIS} tick={{ fontSize: 12 }} />
                    <YAxis stroke={AXIS} tick={{ fontSize: 12 }} />
                    <Tooltip className="tooltip-title" contentStyle={tooltipStyle} formatter={(v) => [fmtInt(v), "Respostas"]} cursor={{ fill: "#ffffff08" }} />
                    <Bar dataKey="count" name="Respostas" radius={[5, 5, 0, 0]}>
                      {npsDistrib.map((e, i) => (
                        <Cell key={i} fill={e.score <= 6 ? "#ef4444" : e.score <= 8 ? "#f59e0b" : "#10b981"} />
                      ))}
                    </Bar>
                  </BarChart>
                </ResponsiveContainer>
              </div>
            </ChartCard>
          </div>

          {/* Qualidade de dados (técnico) */}
          <SectionHead q="Qualidade" title="Cobertura do enriquecimento" desc="Saúde do pipeline: resolução de CEP via BrasilAPI" />
          <div className="grid charts">
            <ChartCard title="CEP → endereço (BrasilAPI)" className="col-4">
              <div className="chart">
                <ResponsiveContainer>
                  <PieChart>
                    <Pie data={qualidade} dataKey="value" nameKey="name" cx="50%" cy="48%" outerRadius={92} innerRadius={52} paddingAngle={2}>
                      {qualidade.map((e, i) => <Cell key={i} fill={e.color} />)}
                    </Pie>
                    <Tooltip className="tooltip-title" contentStyle={tooltipStyle} formatter={(v, n, p) => [fmtInt(v) + " transações", p.payload.name]} />
                    <Legend />
                  </PieChart>
                </ResponsiveContainer>
              </div>
            </ChartCard>
          </div>

          <footer>
            <span className="pill">Dados gerados em {geradoEm}</span>
            &nbsp; · &nbsp; Fonte: <code>output/final/data_lake</code> · Pipeline ETL NogTech (Luigi)
          </footer>
        </div>
      );
    }

    function App() {
      const data = window.__DASHBOARD_DATA__;
      if (!data) {
        return (
          <div className="wrap">
            <div className="card empty">
              <h2>Dados não encontrados</h2>
              <p>Gere o arquivo <code>dashboard/data.js</code> a partir do Data Lake antes de abrir o dashboard:</p>
              <p><code>uv run python -m dashboard.generate_dashboard_data</code></p>
              <p style={{ marginTop: 18 }}>Em seguida sirva esta pasta (evita bloqueio de CORS):<br />
                <code>python -m http.server -d dashboard 8000</code> → http://localhost:8000</p>
            </div>
          </div>
        );
      }
      return <Dashboard data={data} />;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
