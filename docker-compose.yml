services:
  luigi-scheduler:
    build: .
    container_name: luigi_scheduler
    command: uv run luigid --address 0.0.0.0
    ports:
      - "8082:8082"
    volumes:
      - .:/app
      - /app/.venv  # Volume anônimo para proteger o venv do container contra o mount do host
    environment:
      - UV_LINK_MODE=copy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  etl-pipeline:
    build: .
    container_name: etl_nogtech_pipeline
    depends_on:
      luigi-scheduler:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/.venv  # Volume anônimo para proteger o venv do container
    environment:
      - LUIGI_CONFIG_PATH=/app/luigi.cfg
      - LUIGI_LOCAL_SCHEDULER=False
      - UV_LINK_MODE=copy
    command: uv run python main.py

  dashboard:
    build: .
    container_name: nogtech_dashboard
    depends_on:
      etl-pipeline:
        condition: service_completed_successfully  # so' sobe apos o pipeline terminar com sucesso
    volumes:
      - .:/app
      - /app/.venv  # Volume anônimo para proteger o venv do container
    environment:
      - UV_LINK_MODE=copy
    ports:
      - "8000:8000"
    # 1) Gera o data.js a partir do Data Lake; 2) serve a pasta dashboard/
    command: >
      sh -c "uv run python -m dashboard.generate_dashboard_data &&
             uv run python -m http.server 8000 --bind 0.0.0.0 --directory dashboard"
